name: Match Results

on:
  schedule:
    - cron: '*/15 * * * *'

  workflow_dispatch:

jobs:
  results:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python result_bot.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          API_KEY: ${{ secrets.API_KEY }}
